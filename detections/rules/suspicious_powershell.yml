title: Suspicious PowerShell Encoded Command
id: RULE-PS-001
status: experimental
description: Detects suspicious PowerShell execution with encoded or suspicious command content.
author: Waleed Salamah
logsource:
  product: windows
  category: process_creation
detection:
  selection:
    process_name: powershell.exe
    command_line|contains:
      - EncodedCommand
      - IEX
      - DownloadString
condition: selection
level: high
tags:
  - attack.execution
  - attack.t1059.001
falsepositives:
  - Administrative scripts
references:
  - Portfolio project
mitre_tactic: Execution
mitre_technique_id: T1059.001
mitre_technique_name: PowerShell
